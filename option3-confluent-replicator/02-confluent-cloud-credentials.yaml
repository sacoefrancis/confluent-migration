# Confluent Cloud Credentials
# Replace placeholder values with actual Confluent Cloud API Key and Secret
---
apiVersion: v1
kind: Secret
metadata:
  name: ccloud-credentials
  namespace: confluent
type: Opaque
stringData:
  plain.txt: |
    username=<CCLOUD_API_KEY>
    password=<CCLOUD_API_SECRET>

---
# Confluent Cloud Schema Registry Credentials (if using Schema Registry)
apiVersion: v1
kind: Secret
metadata:
  name: ccloud-sr-credentials
  namespace: confluent
type: Opaque
stringData:
  basic.txt: |
    username=<SR_API_KEY>
    password=<SR_API_SECRET>

---
# Confluent License Secret
# Required for Confluent Replicator
apiVersion: v1
kind: Secret
metadata:
  name: confluent-license
  namespace: confluent
type: Opaque
stringData:
  license.txt: "<YOUR_CONFLUENT_LICENSE_KEY>"
