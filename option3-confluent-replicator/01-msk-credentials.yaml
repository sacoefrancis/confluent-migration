# MSK Source Cluster Credentials
# Replace placeholder values with actual MSK SASL/SCRAM credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: msk-source-credentials
  namespace: confluent
type: Opaque
stringData:
  plain.txt: |
    username=msk-user
    password=msk-password

---
# MSK Source Cluster CA Certificate (if using custom CA)
# If MSK uses AWS public CA, this may not be needed
apiVersion: v1
kind: Secret
metadata:
  name: msk-source-tls
  namespace: confluent
type: Opaque
data:
  # Base64-encoded CA certificate for MSK
  # Generate with: cat ca.pem | base64
  ca.pem: <BASE64_ENCODED_MSK_CA_CERT>
